<!-- INCLUDE simple_header.html -->
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f7f9fa;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        padding: 20px;
    }
    .offline-icon {
        font-size: 64px;
        color: #999;
        margin-bottom: 20px;
    }
    h1 {
        font-size: 24px;
        margin-bottom: 10px;
        color: #222;
    }
    p {
        font-size: 16px;
        color: #666;
        max-width: 400px;
        margin-bottom: 20px;
    }
    .btn {
        display: inline-block;
        padding: 10px 24px;
        font-size: 16px;
        font-weight: 500;
        color: #fff;
        background-color: {PWA_THEME_COLOUR};
        border-radius: 4px;
        text-decoration: none;
        transition: opacity 0.2s;
    }
    .btn:hover {
        opacity: 0.8;
    }
</style>

<div class="offline-icon">&#9888;</div>
<h1>{L_PWA_OFFLINE_TITLE}</h1>
<p>{L_PWA_OFFLINE_MESSAGE}</p>
<a href="javascript:window.location.reload();" class="btn">{L_PWA_OFFLINE_RETRY}</a>
