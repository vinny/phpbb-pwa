{% if S_PWA_ENABLED %}
	<link rel="manifest" href="{{ U_PWA_MANIFEST }}" crossorigin="use-credentials">
	<meta name="theme-color" content="{{ PWA_THEME_COLOUR }}">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="{{ SITENAME }}">

	{% if PWA_ICON_512 %}
		<link rel="apple-touch-icon" sizes="512x512" href="{{ PWA_ICON_512 }}">
	{% endif %}

	<script>
		window.phpbbPwaOptions = {
			manifestUrl: '{{ U_PWA_MANIFEST|escape('js') }}',
			serviceWorkerUrl: '{{ U_PWA_SW|escape('js') }}',
			pwaModeCookieName: '{{ PWA_MODE_COOKIE_NAME|escape('js') }}',
			showInstallBanner: {{ S_PWA_SHOW_BANNER ? 'true' : 'false' }},
			isMobile: {{ S_PWA_IS_MOBILE ? 'true' : 'false' }},
			webpushIntegrationActive: {{ S_PWA_WEBPUSH_INTEGRATION_ACTIVE ? 'true' : 'false' }}
		};

		(function(options) {
			'use strict';

			if (!options.webpushIntegrationActive) {
				return;
			}

			function patchWebpushOptions(webpushOptions) {
				if (webpushOptions && webpushOptions.serviceWorkerUrl) {
					webpushOptions.serviceWorkerUrl = options.serviceWorkerUrl;
				}
			}

			if (typeof window.phpbbWebpushOptions !== 'undefined') {
				patchWebpushOptions(window.phpbbWebpushOptions);
				return;
			}

			Object.defineProperty(window, 'phpbbWebpushOptions', {
				configurable: true,
				set: function(webpushOptions) {
					patchWebpushOptions(webpushOptions);
					Object.defineProperty(window, 'phpbbWebpushOptions', {
						value: webpushOptions,
						writable: true,
						configurable: true
					});
				},
				get: function() {
					return undefined;
				}
			});
		})(window.phpbbPwaOptions);
	</script>

	{% INCLUDEJS '@vinny_pwa/pwa.js' %}
{% endif %}
