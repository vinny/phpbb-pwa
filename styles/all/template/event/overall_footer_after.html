{% if S_PWA_ENABLED and S_PWA_SHOW_BANNER and S_PWA_IS_MOBILE %}
	<div id="pwa-install-banner" class="pwa-install-banner" hidden>
		<div class="pwa-install-banner__content">
			{% if PWA_ICON_512 %}
				<img class="pwa-install-banner__icon" src="{{ PWA_ICON_512 }}" alt="{{ SITENAME }}">
			{% endif %}
			<div class="pwa-install-banner__text">
				<div class="pwa-install-banner__title">{{ SITENAME }}</div>
				<div class="pwa-install-banner__subtitle">{{ lang('PWA_INSTALL_SUBTITLE') }}</div>
			</div>
		</div>
		<div class="pwa-install-banner__actions">
			<button id="pwa-btn-dismiss" class="pwa-install-banner__dismiss" type="button">{{ lang('PWA_INSTALL_DISMISS') }}</button>
			<button id="pwa-btn-install" class="pwa-install-banner__install" type="button">{{ lang('PWA_INSTALL_BUTTON') }}</button>
		</div>
	</div>
{% endif %}
